name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Code or steps to reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Error / traceback
      render: text

  - type: input
    id: version
    attributes:
      label: Evalcraft version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11"
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Framework / adapter (if relevant)
      placeholder: "e.g. OpenAI SDK 1.30, LangChain 0.2"
