services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evalcraft
      POSTGRES_PASSWORD: evalcraft
      POSTGRES_DB: evalcraft
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalcraft"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      EVALCRAFT_DATABASE_URL: postgresql+asyncpg://evalcraft:evalcraft@postgres:5432/evalcraft
      EVALCRAFT_REDIS_URL: redis://redis:6379/0

  frontend:
    build:
      context: dashboard/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
