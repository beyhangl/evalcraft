# evalcraft.toml — generated by `evalcraft init`
# Full reference: https://evalcraft.dev/config

[evalcraft]
# Default framework for capture / init commands.
framework = "{framework}"

# Directory where cassettes are stored and loaded from.
cassette_dir = "{tests_dir}/cassettes"

# Default agent tag applied to captured cassettes.
# agent_name = "my-agent"

# Default record mode when running pytest.
#   none — replay-only (skip tests if cassette missing)
#   new  — record cassettes that don't exist yet
#   all  — always re-record (overwrite existing cassettes)
record_mode = "none"

[capture]
# Auto-upload captured cassettes to the Evalcraft cloud dashboard.
# Requires an API key set via `evalcraft cloud login`.
auto_upload = false

# Strip sensitive values from cassettes before saving.
# sanitize = ["OPENAI_API_KEY", "ANTHROPIC_API_KEY"]

[eval]
# Default cost threshold in USD applied to every eval assertion.
# max_cost_usd = 0.10

# Default token count threshold.
# max_tokens = 8000

# Default latency threshold in milliseconds.
# max_latency_ms = 30000

[cloud]
# Override the Evalcraft cloud API endpoint.
# base_url = "https://api.evalcraft.dev/v1"
