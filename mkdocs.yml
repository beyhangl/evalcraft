site_name: Evalcraft
site_description: The pytest for AI agents — capture, replay, mock, and evaluate agent behavior.
site_url: https://evalcraft.dev
repo_url: https://github.com/beyhangl/evalcraft
repo_name: beyhangl/evalcraft

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - Overview: user-guide/index.md
    - Quickstart: user-guide/quickstart.md
    - "Case Study: Catching a Regression": user-guide/five-minute-case-study.md
    - Concepts: user-guide/concepts.md
    - Capture API: user-guide/capture.md
    - Replay Engine: user-guide/replay.md
    - Mock LLM & Tools: user-guide/mock.md
    - Scorers: user-guide/scorers.md
    - pytest Plugin: user-guide/pytest-plugin.md
    - CLI Reference: user-guide/cli.md
    - Adapters:
      - OpenAI: user-guide/adapters/openai.md
      - Anthropic: user-guide/adapters/anthropic.md
      - LangGraph: user-guide/adapters/langgraph.md
      - CrewAI: user-guide/adapters/crewai.md
    - CI/CD Integration: user-guide/ci-cd.md
    - Changelog: user-guide/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/beyhangl/evalcraft
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/evalcraft/
